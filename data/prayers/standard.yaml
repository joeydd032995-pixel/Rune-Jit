# data/prayers/standard.yaml — Standard prayer book data for Rune-Jit
#
# Single source of truth for all standard prayer values.
# PrayerDefs.kt loads this file at startup — no values are hardcoded in Kotlin.
# Every value below has an inline wiki citation.
#
# Source: https://oldschool.runescape.wiki/w/Prayer#Standard_prayers
# License: CC BY-NC-SA 3.0 (wiki content)
#
# Drain formula: drain accumulator increments by drain_effect every tick.
# Threshold = 600 * (1 + floor(prayerBonus / 30))
# When accumulator >= threshold, lose 1 prayer point and subtract threshold.
# Source: https://oldschool.runescape.wiki/w/Prayer#Drain_rate

