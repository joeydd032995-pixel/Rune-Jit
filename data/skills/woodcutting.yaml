# data/skills/woodcutting.yaml — Woodcutting skill data for Rune-Jit
#
# Single source of truth for all Woodcutting values.
# The WoodcuttingPlugin.kt loads this file at startup — no values are hardcoded in Kotlin.
# Every value below has an inline wiki citation.
#
# Source: https://oldschool.runescape.wiki/w/Woodcutting
# License: CC BY-NC-SA 3.0 (wiki content)

meta:
  skill: WOODCUTTING
  ticks_per_attempt: 4        # 4 ticks = 2.4 seconds per chop attempt
                               # https://oldschool.runescape.wiki/w/Woodcutting#Mechanics
  base_chop_animation: 879    # TODO: verify from cache index 12 after /load-osrs-cache-full
  idle_animation: 808

# ---------------------------------------------------------------------------
# Success rate formula (implemented in WoodcuttingAction.kt, not evaluated here)
#
#   chance = rand(255) < floor((player_level * 2 + axe.bonus) / tree.difficulty)
#
# Source: https://oldschool.runescape.wiki/w/Woodcutting#Success_chance
# Community verification: https://twitter.com/JagexAsh/status/1069662911922913280
# ---------------------------------------------------------------------------

