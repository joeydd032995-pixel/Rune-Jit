# ---------------------------------------------------------------------------
# Bird Nests
# ---------------------------------------------------------------------------
# Source: https://oldschool.runescape.wiki/w/Bird_nest
#
# Bird nests fall when chopping any non-Blisterwood tree.
# The 1/256 rate is the widely cited community figure; Jagex has not published
# the exact formula. See ADR-006 (to be written) for sourcing decision.

bird_nests:
  base_drop_chance: 256       # 1/256 per log received
                               # https://oldschool.runescape.wiki/w/Bird_nest#Obtaining
  drop_table_ref: "data/drops/bird-nests.yaml"  # loot table stub — not yet created
  types:
    - SEEDS_NEST               # contains tree/fruit tree seeds
    - RING_NEST                # contains rings (gold, sapphire, emerald, ruby, diamond)
    - EMPTY_NEST               # no contents (rarer than other types)
  item_id_empty: 5075          # verify: data/osrsbox/items-complete.json key "5075"
  item_id_seeds: 5070          # verify: data/osrsbox/items-complete.json key "5070"
  item_id_ring: 5071           # verify: data/osrsbox/items-complete.json key "5071"

# ---------------------------------------------------------------------------
# Pet — Beaver
# ---------------------------------------------------------------------------
# Source: https://oldschool.runescape.wiki/w/Beaver
#
# NOTE: Exact drop rate formula is not officially confirmed by Jagex.
# Using community-researched approximation. See ADR-007 (to be written).

pet:
  name: BEAVER
  item_id: 13322              # verify: data/osrsbox/items-complete.json key "13322"
  base_rate: 72000            # ~1/72,000 at level 99 (community approximation)
                               # https://oldschool.runescape.wiki/w/Beaver#Drop_rate
  scales_with_level: true     # higher level → better chance (not confirmed exact formula)
  wiki: "https://oldschool.runescape.wiki/w/Beaver"

