# ---------------------------------------------------------------------------
# Gem Drops
# ---------------------------------------------------------------------------
# Source: https://oldschool.runescape.wiki/w/Uncut_gem#Gem_rocks
#
# 1/256 chance per successful ore to roll the gem drop table.
# Weighted selection among gems below.

gem_drops:
  base_drop_chance: 256       # 1/256 per ore received
                               # https://oldschool.runescape.wiki/w/Uncut_gem#Gem_rocks
  gems:
    - item_id: 1623             # Uncut sapphire
      weight: 4                 # https://oldschool.runescape.wiki/w/Uncut_sapphire
    - item_id: 1621             # Uncut emerald
      weight: 2                 # https://oldschool.runescape.wiki/w/Uncut_emerald
    - item_id: 1619             # Uncut ruby
      weight: 1                 # https://oldschool.runescape.wiki/w/Uncut_ruby
    - item_id: 1617             # Uncut diamond
      weight: 1                 # https://oldschool.runescape.wiki/w/Uncut_diamond

