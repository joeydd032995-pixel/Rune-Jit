# data/skills/mining.yaml — Mining skill data for Rune-Jit
#
# Single source of truth for all Mining values.
# The MiningPlugin.kt loads this file at startup — no values are hardcoded in Kotlin.
# Every value below has an inline wiki citation.
#
# Source: https://oldschool.runescape.wiki/w/Mining
# License: CC BY-NC-SA 3.0 (wiki content)

meta:
  skill: MINING
  ticks_per_attempt: 3        # 3 ticks = 1.8 seconds per mining attempt
                               # https://oldschool.runescape.wiki/w/Mining#Mechanics
  base_animation: 624         # TODO: verify from cache index 12 after /load-osrs-cache-full
  idle_animation: 808

# ---------------------------------------------------------------------------
# Success rate formula (implemented in MiningAction.kt, not evaluated here)
#
#   chance = rand(255) < floor((player_level * 2 + pickaxe.mining_bonus) / rock.difficulty)
#
# Source: https://oldschool.runescape.wiki/w/Mining#Success_chance
# ---------------------------------------------------------------------------

