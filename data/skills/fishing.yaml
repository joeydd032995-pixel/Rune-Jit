# data/skills/fishing.yaml — Fishing skill data for Rune-Jit
#
# Single source of truth for all Fishing values.
# The FishingPlugin.kt loads this file at startup — no values are hardcoded in Kotlin.
# Every value below has an inline wiki citation.
#
# Source: https://oldschool.runescape.wiki/w/Fishing
# License: CC BY-NC-SA 3.0 (wiki content)

meta:
  skill: FISHING
  ticks_per_attempt: 5            # 5 ticks = 3.0 seconds per fishing attempt
                                   # https://oldschool.runescape.wiki/w/Fishing#Mechanics
  # No success roll — fishing always yields a fish after ticksPerAttempt ticks
  # (unlike Woodcutting/Mining which have a per-tick success chance).
  # Source: https://oldschool.runescape.wiki/w/Fishing

